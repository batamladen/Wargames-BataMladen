<svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <clipPath id="hexclip">
      <polygon points="140,8 248,74 248,206 140,272 32,206 32,74"/>
    </clipPath>
    <radialGradient id="faceGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </radialGradient>
    <radialGradient id="visorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b5de5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5a189a" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Outer decorative rings -->
  <polygon points="140,2 256,71 256,209 140,278 24,209 24,71"
    fill="none" stroke="#7b2ff7" stroke-width="0.8" opacity="0.25"/>
  <polygon points="140,14 244,77 244,203 140,266 36,203 36,77"
    fill="none" stroke="#7b2ff7" stroke-width="0.5" opacity="0.15"/>

  <!-- Main hex shape -->
  <polygon points="140,8 248,74 248,206 140,272 32,206 32,74"
    fill="url(#faceGrad)" stroke="#7b2ff7" stroke-width="2.5"/>

  <!-- Grid bg -->
  <g clip-path="url(#hexclip)" opacity="0.08">
    <line x1="0" y1="28"  x2="280" y2="28"  stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="46"  x2="280" y2="46"  stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="64"  x2="280" y2="64"  stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="82"  x2="280" y2="82"  stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="100" x2="280" y2="100" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="118" x2="280" y2="118" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="136" x2="280" y2="136" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="154" x2="280" y2="154" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="172" x2="280" y2="172" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="190" x2="280" y2="190" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="208" x2="280" y2="208" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="226" x2="280" y2="226" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="0" y1="244" x2="280" y2="244" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="28"  y1="0" x2="28"  y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="46"  y1="0" x2="46"  y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="64"  y1="0" x2="64"  y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="82"  y1="0" x2="82"  y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="100" y1="0" x2="100" y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="118" y1="0" x2="118" y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="136" y1="0" x2="136" y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="154" y1="0" x2="154" y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="172" y1="0" x2="172" y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="190" y1="0" x2="190" y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="208" y1="0" x2="208" y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="226" y1="0" x2="226" y2="280" stroke="#a855f7" stroke-width="0.6"/>
    <line x1="244" y1="0" x2="244" y2="280" stroke="#a855f7" stroke-width="0.6"/>
  </g>

  <!-- Head shape — rounded skull -->
  <ellipse cx="140" cy="118" rx="62" ry="72" fill="#1e0f38"/>

  <!-- Neck -->
  <rect x="122" y="182" width="36" height="40" rx="6" fill="#1e0f38"/>

  <!-- Ear left -->
  <ellipse cx="78" cy="118" rx="10" ry="16" fill="#1e0f38"/>
  <ellipse cx="78" cy="118" rx="5" ry="9" fill="#150a2a"/>

  <!-- Ear right -->
  <ellipse cx="202" cy="118" rx="10" ry="16" fill="#1e0f38"/>
  <ellipse cx="202" cy="118" rx="5" ry="9" fill="#150a2a"/>

  <!-- Visor / eye piece -->
  <rect x="90" y="100" width="100" height="32" rx="6" fill="url(#visorGlow)"/>
  <!-- Visor shine top -->
  <rect x="92" y="102" width="96" height="8" rx="3" fill="#c77dff" opacity="0.35"/>
  <!-- Visor scan lines -->
  <line x1="90"  y1="108" x2="190" y2="108" stroke="#150a2a" stroke-width="0.8" opacity="0.5"/>
  <line x1="90"  y1="116" x2="190" y2="116" stroke="#150a2a" stroke-width="0.8" opacity="0.5"/>
  <line x1="90"  y1="124" x2="190" y2="124" stroke="#150a2a" stroke-width="0.8" opacity="0.5"/>
  <!-- Visor vertical divider -->
  <line x1="140" y1="100" x2="140" y2="132" stroke="#150a2a" stroke-width="1.5" opacity="0.6"/>
  <!-- Left eye glow -->
  <ellipse cx="115" cy="116" rx="16" ry="8" fill="#e040fb" opacity="0.25"/>
  <ellipse cx="115" cy="116" rx="8"  ry="4" fill="#e040fb" opacity="0.5"/>
  <!-- Right eye glow -->
  <ellipse cx="165" cy="116" rx="16" ry="8" fill="#e040fb" opacity="0.25"/>
  <ellipse cx="165" cy="116" rx="8"  ry="4" fill="#e040fb" opacity="0.5"/>

  <!-- Nose -->
  <path d="M134,136 L128,158 L140,155 L152,158 L146,136" fill="none" stroke="#5a189a" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>

  <!-- Mouth — thin stern line with corner ticks -->
  <line x1="112" y1="172" x2="168" y2="172" stroke="#9b5de5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="168" x2="112" y2="176" stroke="#9b5de5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="168" y1="168" x2="168" y2="176" stroke="#9b5de5" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Chin detail bar -->
  <rect x="126" y="184" width="28" height="3" rx="1" fill="#7b2ff7" opacity="0.5"/>

  <!-- Forehead crease lines -->
  <line x1="118" y1="90" x2="136" y2="90" stroke="#5a189a" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <line x1="144" y1="90" x2="162" y2="90" stroke="#5a189a" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>

  <!-- Circuit traces left side -->
  <line x1="88"  y1="100" x2="68" y2="100" stroke="#c77dff" stroke-width="1.2" opacity="0.6"/>
  <line x1="68"  y1="100" x2="68" y2="84"  stroke="#c77dff" stroke-width="1.2" opacity="0.6"/>
  <line x1="68"  y1="84"  x2="56" y2="84"  stroke="#c77dff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="56" cy="84" r="3" fill="#c77dff" opacity="0.8"/>
  <circle cx="68" cy="100" r="2" fill="#c77dff" opacity="0.6"/>

  <!-- Circuit traces right side -->
  <line x1="192" y1="100" x2="212" y2="100" stroke="#c77dff" stroke-width="1.2" opacity="0.6"/>
  <line x1="212" y1="100" x2="212" y2="84"  stroke="#c77dff" stroke-width="1.2" opacity="0.6"/>
  <line x1="212" y1="84"  x2="224" y2="84"  stroke="#c77dff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="224" cy="84" r="3" fill="#c77dff" opacity="0.8"/>
  <circle cx="212" cy="100" r="2" fill="#c77dff" opacity="0.6"/>

  <!-- Corner brackets -->
  <path d="M68,52 L48,52 L48,76"   fill="none" stroke="#c77dff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M212,52 L232,52 L232,76" fill="none" stroke="#c77dff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M68,228 L48,228 L48,204" fill="none" stroke="#c77dff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M212,228 L232,228 L232,204" fill="none" stroke="#c77dff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Side bar panels left -->
  <rect x="36" y="112" width="14" height="7" rx="1" fill="#7b2ff7" opacity="0.4"/>
  <rect x="36" y="122" width="14" height="7" rx="1" fill="#7b2ff7" opacity="0.55"/>
  <rect x="36" y="132" width="14" height="7" rx="1" fill="#9b5de5" opacity="0.7"/>
  <rect x="36" y="142" width="14" height="7" rx="1" fill="#7b2ff7" opacity="0.55"/>
  <rect x="36" y="152" width="14" height="7" rx="1" fill="#7b2ff7" opacity="0.4"/>

  <!-- Side bar panels right -->
  <rect x="230" y="112" width="14" height="7" rx="1" fill="#7b2ff7" opacity="0.4"/>
  <rect x="230" y="122" width="14" height="7" rx="1" fill="#7b2ff7" opacity="0.55"/>
  <rect x="230" y="132" width="14" height="7" rx="1" fill="#9b5de5" opacity="0.7"/>
  <rect x="230" y="142" width="14" height="7" rx="1" fill="#7b2ff7" opacity="0.55"/>
  <rect x="230" y="152" width="14" height="7" rx="1" fill="#7b2ff7" opacity="0.4"/>

  <!-- Dot accents on hex corners -->
  <circle cx="140" cy="10"  r="3.5" fill="#9b5de5" opacity="0.9"/>
  <circle cx="248" cy="74"  r="3.5" fill="#9b5de5" opacity="0.9"/>
  <circle cx="248" cy="206" r="3.5" fill="#9b5de5" opacity="0.9"/>
  <circle cx="140" cy="270" r="3.5" fill="#9b5de5" opacity="0.9"/>
  <circle cx="32"  cy="206" r="3.5" fill="#9b5de5" opacity="0.9"/>
  <circle cx="32"  cy="74"  r="3.5" fill="#9b5de5" opacity="0.9"/>

  <!-- Mid-edge dots -->
  <circle cx="194" cy="41"  r="2" fill="#c77dff" opacity="0.5"/>
  <circle cx="86"  cy="41"  r="2" fill="#c77dff" opacity="0.5"/>
  <circle cx="194" cy="239" r="2" fill="#c77dff" opacity="0.5"/>
  <circle cx="86"  cy="239" r="2" fill="#c77dff" opacity="0.5"/>

</svg>
